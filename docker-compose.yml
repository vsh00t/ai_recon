services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      AI_RECON_DB_URL: sqlite+aiosqlite:////data/ai_recon.db
      AI_RECON_JWT_SECRET: ${AI_RECON_JWT_SECRET:-change-me}
      AI_RECON_BOOTSTRAP_ADMIN_EMAIL: ${AI_RECON_BOOTSTRAP_ADMIN_EMAIL:-admin@example.com}
      AI_RECON_BOOTSTRAP_ADMIN_PASSWORD: ${AI_RECON_BOOTSTRAP_ADMIN_PASSWORD:-changeme123}
      AI_RECON_ALLOWED_ORIGINS: '["http://localhost:3000"]'
    volumes:
      - api-data:/data
    expose: ["8000"]

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      AI_RECON_API_URL: http://api:8000
    expose: ["3000"]
    depends_on: [api]

  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on: [api, web]

volumes:
  api-data:
