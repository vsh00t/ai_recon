# blackbox_saas.yaml — Passive fingerprinting profile for public SaaS AI endpoints
# Suitable for black-box assessment with no authentication, no repository access,
# and no insider knowledge of the target deployment.
#
# Intrusiveness: low — no destructive probes, no jailbreak attempts, no PII requests.
---

name: blackbox_saas
description: >
  Passive fingerprinting of a public SaaS AI endpoint. No auth, no repo access.
  Focuses on infrastructure fingerprinting, model identity, behavioral analysis,
  and guardrail detection without triggering security monitoring or rate limits.
  Safe for use against production endpoints during authorized assessments.
intrusiveness_max: low

techniques:
  enable:
    # Passive — no conversation with the model
    - passive.header_fingerprint
    - passive.health_probe
    - passive.openai_compat_probe
    - passive.tls_metadata
    - passive.dns_recon
    - passive.js_config_extract

    # Active — conversation-based, low intrusiveness
    - active.service_discovery
    - active.status_triage
    - active.gateway_detect
    - active.model_identity
    - active.model_contradiction
    - active.model_cutoff
    - active.model_behavior
    - active.context_window
    - active.tokenizer_probe
    - active.guardrail_probe

    # Infrastructure side-channels
    - infra.side_channel_timing
    - infra.cost_oracle

    # Evasion / canary detection
    - evasion.honeypot_detect

  disable:
    # Excluded: require auth or repo access
    - passive.repo_mining
    - passive.env_file_scan
    - passive.dependency_audit

    # Excluded: high intrusiveness
    - active.jailbreak_suite
    - active.prompt_injection
    - active.indirect_injection
    - active.rag_inversion
    - active.mcp_enum
    - active.a2a_enum
    - active.tool_enum

    # Excluded: SIEM/logging analysis requires internal access
    - adapters.siem_query

options:
  model_identity:
    max_attempts: 3
    try_contradiction: true
    try_indirect: true
    confidence_threshold: 0.7

  context_window:
    max_test_tokens: 128000
    step_size: 8192
    binary_search: true
    marker_length: 64

  model_behavior:
    run_arithmetic: true
    run_coding: true
    run_reasoning: true
    run_verbosity_analysis: true

  guardrail_probe:
    categories:
      - violence
      - pii_request
      - jailbreak_classic
    max_probes_per_category: 2

  passive.header_fingerprint:
    follow_redirects: true
    capture_all_headers: true

  passive.tls_metadata:
    check_certificate: true
    capture_san: true
    capture_issuer: true

  passive.dns_recon:
    resolve_cname: true
    check_txt: true
    enumerate_subdomains: false

  infra.side_channel_timing:
    samples: 10
    measure_ttft: true
    measure_total: true
    jitter_ms: 200

  rate_limit:
    rps: 0.5
    jitter_seconds: 2.0
    max_concurrent: 1

  stealth:
    rotate_user_agent: true
    add_jitter: true
    avoid_burst: true
